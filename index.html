<!DOCTYPE html><html lang=ru><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Летний корпоратив 2026 — выбор площадки</title><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2d6a4f;
      --primary-dark: #1b4332;
      --primary-light: #52b788;
      --primary-soft: #d8f3dc;
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1a202c;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --border-soft: #f1f5f9;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #52b788 100%);
      color: white;
      padding: 56px 24px 48px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .header-inner { max-width: 1200px; margin: 0 auto; text-align: center; position: relative; }
    header h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.02em; }
    header .subtitle { font-size: 1.1rem; opacity: 0.92; max-width: 600px; margin: 0 auto; }
    .header-meta {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 7px 16px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    /* ===== MAIN ===== */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 16px 60px; }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      padding: 6px;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .tab-btn {
      flex: 1;
      min-width: 130px;
      background: transparent;
      border: none;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(45, 106, 79, 0.25);
    }

    /* ===== FILTERS ===== */
    .filters-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .filters-row {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .filter-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      background: white;
      cursor: pointer;
      outline: none;
    }
    .filter-select:focus { border-color: var(--primary-light); }
    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--border);
      background: white;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
      font-weight: 500;
    }
    .chip:hover { border-color: var(--primary-light); color: var(--text); }
    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .filter-reset {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .filter-reset:hover { color: var(--text); }

    /* ===== VENUE CARDS ===== */
    .venues { display: flex; flex-direction: column; gap: 24px; }

    .venue-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      border: 1px solid var(--border-soft);
    }
    .venue-card:hover {
      box-shadow: var(--shadow-md);
    }
    .venue-card.hidden { display: none; }

    .venue-photo {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: var(--border-soft);
    }

    .venue-header {
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }
    .venue-title { flex: 1; min-width: 0; }
    .venue-title h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .venue-title a.site-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .venue-title a.site-link:hover { text-decoration: underline; }
    .venue-address {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 6px;
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      background: #ebf5ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.82rem;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.15s;
      font-family: inherit;
      cursor: pointer;
    }
    .dl-btn:hover { background: #dbeafe; }

    /* ===== CRITERIA ===== */
    .criteria-table { padding: 4px 26px; }
    .criteria-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 16px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border-soft);
      align-items: start;
    }
    .criteria-row:last-child { border-bottom: none; }
    .criteria-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .criteria-value {
      font-size: 0.93rem;
      color: var(--text);
      line-height: 1.55;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-right: 4px;
      margin-bottom: 2px;
    }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-gray { background: #e5e7eb; color: #374151; }
    .badge-blue { background: #dbeafe; color: #1e40af; }

    /* ===== COMPARISON TABLE ===== */
    .comparison-wrapper {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .comparison-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      min-width: 900px;
    }
    .comparison-table th,
    .comparison-table td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: top;
    }
    .comparison-table thead th {
      background: var(--bg);
      font-weight: 700;
      color: var(--text);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .comparison-table thead th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--bg);
      min-width: 160px;
    }
    .comparison-table tbody td:first-child {
      font-weight: 700;
      color: var(--text);
      position: sticky;
      left: 0;
      background: var(--card);
      z-index: 1;
      min-width: 160px;
      box-shadow: 1px 0 0 var(--border-soft);
    }
    .comparison-table tbody tr:hover td {
      background: #f8fafc;
    }
    .comparison-table tbody tr:hover td:first-child {
      background: #f0f9f4;
    }
    .comp-venue-link {
      display: block;
      font-size: 0.75rem;
      color: var(--primary);
      text-decoration: none;
      margin-top: 2px;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 720px) {
      header { padding: 40px 20px 36px; }
      header h1 { font-size: 1.75rem; }
      header .subtitle { font-size: 1rem; }
      main { padding: 20px 12px 40px; }
      .venue-header {
        flex-direction: column;
        padding: 18px 20px 16px;
      }
      .criteria-table { padding: 4px 20px; }
      .criteria-row {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 10px 0;
      }
      .criteria-name { font-size: 0.78rem; }
      .filters-row { flex-direction: column; align-items: stretch; gap: 10px; }
      .filter-reset { margin-left: 0; align-self: flex-start; }
      .tab-btn { font-size: 0.85rem; min-width: 110px; padding: 9px 12px; }
    }
  </style></head><body><header><div class=header-inner><h1>🌿 Летний корпоратив 2026</h1><p class=subtitle>Голосуем за площадку командой — обсуждаем, выбираем, празднуем</p><div class=header-meta><span class=meta-chip>👥 До 50 человек</span><span class=meta-chip>🗓 Лето 2026</span><span class=meta-chip>📍 Москва и область</span></div></div></header><main><div class=tabs><button class="tab-btn active" data-tab=cards>📋 Карточки площадок</button><button class=tab-btn data-tab=compare>📊 Сравнить все</button></div></div><div id=tab-cards><div class=filters-card><div class=filters-row><div class=filter-group><span class=filter-label>Сортировать:</span><select class=filter-select id=sort-select><option value=default>По умолчанию</option><option value=price-low>По цене: дешевле</option><option value=distance>Ближе к Москве</option></select></div><div class=filter-group><span class=filter-label>Фильтры:</span><div class=filter-chips id=filter-chips><button class=chip data-filter=indoor>🌧️ Не боится дождя</button><button class=chip data-filter=water>🌊 Водные активности</button><button class=chip data-filter=metro>🚇 Метро рядом</button><button class=chip data-filter=catering>🍽️ Своя кухня</button><button class=chip data-filter=exclusive>🔒 Только мы</button></div></div><button class=filter-reset id=filter-reset>Сбросить</button></div></div><div class=venues id=venues></div><div class=empty-state id=empty-state style=display:none;><div class=emoji>🤔</div><p>Под выбранные фильтры площадок не нашлось.<br>Попробуйте изменить параметры.</p></div></div><div id=tab-compare style=display:none;><div class=comparison-wrapper><div class=comparison-scroll><table class=comparison-table id=comparison-table></table></div></div></div></main><script>

      { icon: '⚡', name: 'Транспорт', html: '<span class="badge badge-green">10 мин от МКАД</span> Дмитровское или Осташковское шоссе. Парковка на 200 мест. Метро не рядом — нужен транспорт.' },
      { icon: '🌊', name: 'Водные активности', html: '<span class="badge badge-green">Богатая программа</span> Корпоративная парусная регата (флот ~50 яхт, 6–300 чел.), прогулки на парусных и моторных яхтах (2–35 чел.), SUP-серфинг, вейксёрфинг (школа с профи-инструкторами), флайборд (школа с инструкторами). Все площадки с выходом к воде и причалу.' },
      { icon: '🏃', name: 'Тимбилдинг', html: 'Открытые веранды для тимбилдинга на любой вкус. Волейбольный турнир, мастер-классы по флайборду и вейксёрфу, SUP-прогулки, парусная регата.' },
      { icon: '🍽️', name: 'Кейтеринг', html: 'Своя кухня для выездного кейтеринга в банкетном зале Шале. Подрядчиков по питанию можно привозить своих — уточнить условия.' },
      { icon: '🌧️', name: 'Дождь', html: '<span class="badge badge-yellow">Частично</span> Банкетный зал Шале и шатры с укрытием — основная защита от дождя. Водные активности зависят от погоды.' },
      { icon: '🏘️', name: 'Соседние мероприятия', html: 'Территория яхт-клуба — часть дома отдыха «Берёзки». Круглосуточная охрана и видеонаблюдение. Уточнить эксклюзивность зоны под мероприятие.' },
      { icon: '⛔', name: 'Ограничения', html: 'Нет метро рядом — нужен транспорт или автомобили. Водные активности зависят от погоды и сезона.' }
    ]

/* ============================================================
   STATE & STORAGE
   ============================================================ */

let state = { votes: {}, comments: {} };
let currentUser = '';
let activeFilters = new Set();
let activeSort = 'default';
let activeTab = 'cards';
let isOnline = false;

function makeEmptyState() {
  const s = { votes: {}, comments: {} };
  VENUES.forEach(v => {
    s.votes[v.id] = [];
    s.comments[v.id] = [];
  });
  return s;
}

function ensureStateShape(s) {
  if (!s || typeof s !== 'object') return makeEmptyState();
  s.votes = s.votes || {};
  s.comments = s.comments || {};
  // Удаляем данные площадок, которых больше нет (например, удалённую ОК Реку)
  const validIds = new Set(VENUES.map(v => v.id));
  for (const k of Object.keys(s.votes)) {
    if (!validIds.has(k)) delete s.votes[k];
  }
  for (const k of Object.keys(s.comments)) {
    if (!validIds.has(k)) delete s.comments[k];
  }
  VENUES.forEach(v => {
    if (!Array.isArray(s.votes[v.id])) s.votes[v.id] = [];
    if (!Array.isArray(s.comments[v.id])) s.comments[v.id] = [];
  });
  return s;
}

async function loadSharedState() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    setOnline(true);
    if (result && result.value) {
      try { return ensureStateShape(JSON.parse(result.value)); }
      catch { return makeEmptyState(); }
    }
    return makeEmptyState();
  } catch (e) {
    setOnline(true);
    return makeEmptyState();
  }
}

async function saveSharedState() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
    setOnline(true);
    return true;
  } catch (e) {
    console.error('Не удалось сохранить:', e);
    setOnline(false);
    return false;
  }
}

function setOnline(online) {
  isOnline = online;
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getVenueOrder() {
  let list = [...VENUES];
  if (activeFilters.size > 0) {
    list = list.filter(v => {
      for (const f of activeFilters) {
        if (!v.meta[f]) return false;
      }
      return true;
    });
  } else if (activeSort === 'price-low') {
    list.sort((a, b) => a.meta.priceRank - b.meta.priceRank);
  } else if (activeSort === 'distance') {
    list.sort((a, b) => a.meta.distanceKm - b.meta.distanceKm);
  }
  return list;
}

function renderCards() {
  const container = document.getElementById('venues');
  const empty = document.getElementById('empty-state');
  const list = getVenueOrder();

  if (list.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';


  container.innerHTML = list.map(v => {

    const rowsHtml = v.rows.map(r =>
      `<div class="criteria-row">
        <div class="criteria-name">${r.icon} ${esc(r.name)}</div>
        <div class="criteria-value">${r.html}</div>
      </div>`
    ).join('');


    return `
      <div class="venue-card" data-id="${v.id}">
        <img class="venue-photo" src="${esc(v.photo)}" alt="${esc(v.name)}" loading="lazy" onerror="this.style.display='none'">
        <div class="venue-header">
          <div class="venue-title">
            <h2>${esc(v.name)}</h2>
            <a class="site-link" href="${esc(v.site)}" target="_blank" rel="noopener">${esc(v.siteLabel)} ↗</a>
            <div class="venue-address">📍 ${esc(v.address)}</div>
            ${v.pdfId ? `<button class="dl-btn" onclick="downloadPdf('${v.pdfId}', '${esc(v.pdfFilename)}')" type="button">⬇ ${esc(v.pdfLabel)}</button>` : ''}
          </div>

        </div>
        <div class="criteria-table">${rowsHtml}</div>
      </div>
    `;
  }).join('');

}


function renderComparison() {
  const table = document.getElementById('comparison-table');
  const list = [...VENUES];

  const headerRow = `<thead><tr>
    <th>Критерий</th>
    ${list.map(v => `<th>
      ${esc(v.name)}
      <a class="comp-venue-link" href="${esc(v.site)}" target="_blank" rel="noopener">сайт ↗</a>
    </th>`).join('')}
  </tr></thead>`;

  const fields = [
    { key: 'price', label: '💰 Цена' },
    { key: 'capacity', label: '👥 Вместимость' },
    { key: 'transport', label: '⚡ Транспорт' },
    { key: 'sport', label: '🏃 Спорт' },
    { key: 'catering', label: '🍽️ Кейтеринг' },
    { key: 'rain', label: '🌧️ Дождь' },
    { key: 'exclusive', label: '🔒 Эксклюзивность' }
  ];

  const bodyRows = fields.map(f =>
    `<tr>
      <td>${f.label}</td>
      ${list.map(v => `<td>${esc(v.short[f.key] || '—')}</td>`).join('')}
    </tr>`
  ).join('');

  table.innerHTML = headerRow + '<tbody>' + bodyRows + '</tbody>';
}

function render() {
  if (activeTab === 'cards') {
    renderCards();
  } else {
    renderComparison();
  }
}

/* ============================================================
   UI HANDLERS
   ============================================================ */

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('tab-cards').style.display = activeTab === 'cards' ? '' : 'none';
    document.getElementById('tab-compare').style.display = activeTab === 'compare' ? '' : 'none';
    render();
  });
});


document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const f = chip.dataset.filter;
    if (activeFilters.has(f)) {
      activeFilters.delete(f);
      chip.classList.remove('active');
    } else {
      activeFilters.add(f);
      chip.classList.add('active');
    }
    render();
  });
});

document.getElementById('sort-select').addEventListener('change', e => {
  activeSort = e.target.value;
  render();
});

document.getElementById('filter-reset').addEventListener('click', () => {
  activeFilters.clear();
  activeSort = 'default';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('sort-select').value = 'default';
  render();
});

/* ============================================================
   PDF DOWNLOAD (из встроенного base64)
   ============================================================ */

function downloadPdf(elementId, filename) {
  const el = document.getElementById(elementId);
  if (!el) {
    alert('Не удалось найти PDF-файл. Попробуйте обновить страницу.');
    return;
  }
  const b64 = el.textContent.trim();
  try {
    // Декодируем base64 в бинарные данные
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) {
    console.error('Ошибка скачивания PDF:', e);
    alert('Не удалось скачать PDF. Подробнее в консоли браузера.');
  }
}

/* ============================================================
   INIT & POLLING
   ============================================================ */

async function init() {

  state = await loadSharedState();
  render();

  setInterval(async () => {
    const active = document.activeElement;

    try {
      const fresh = await loadSharedState();
      if (JSON.stringify(fresh) !== JSON.stringify(state)) {
        state = fresh;
        render();
      }
    } catch (e) {
      setOnline(false);
    }
  }, POLL_INTERVAL);
}

init();
